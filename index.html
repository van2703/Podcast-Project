<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Podcast & Music Player</title>
    <style>
        /* 🌟 BƯỚC 1: HỆ THỐNG MÀU SẮC & GLASSMORPHISM 🌟 */
        :root {
            --bg-image: url('background.jpg');
            --glass-container: rgba(255, 240, 245, 0.45); 
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #713651;
            --text-sub: #a83e73;
            --card-bg: rgba(255, 255, 255, 0.5);
            --card-hover: rgba(255, 255, 255, 0.8);
            --active-bg: #d7678ce0;
            --active-text: #ffffff;
            --meta-text: #c86b8e;
        }

        body.theme-greeny { --glass-container: rgba(232, 245, 233, 0.45); --glass-border: rgba(255, 255, 255, 0.5); --text-main: #1b5e20; --text-sub: #388e3c; --active-bg: #5bb35eb5; --meta-text: #66bb6a; }
        body.theme-bluebaby { --glass-container: rgba(227, 242, 253, 0.45); --glass-border: rgba(255, 255, 255, 0.5); --text-main: #0d47a1; --text-sub: #1976d2; --active-bg: #5d9fd4; --meta-text: #42a5f5; }
        body.theme-blackwhite { --glass-container: rgba(20, 20, 20, 0.65); --glass-border: rgba(255, 255, 255, 0.1); --text-main: #f0f0f0; --text-sub: #aaaaaa; --card-bg: rgba(50, 50, 50, 0.6); --card-hover: rgba(60, 60, 60, 0.8); --active-bg: #e2e2e2; --active-text: #000000; --meta-text: #888888; }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; 
            color: var(--text-main); background-image: var(--bg-image); 
            background-size: cover; background-position: center; background-attachment: fixed; 
            transition: all 0.4s ease; font-size: 0.95em; 
        }
        
        .theme-switcher { position: absolute; top: 20px; left: 20px; display: flex; gap: 8px; z-index: 10; }
        .theme-btn { width: 22px; height: 22px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); cursor: pointer; transition: transform 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .theme-btn:hover { transform: scale(1.2); }
        .btn-pinky { background-color: #ffb6c1; } .btn-greeny { background-color: #a5d6a7; } .btn-bluebaby { background-color: #90caf9; } .btn-blackwhite { background-color: #424242; }

        /* 🌟 BƯỚC 2: BỐ CỤC 2 CỘT HIỆN ĐẠI 🌟 */
        .main-wrapper { 
            display: flex; width: 92%; max-width: 1000px; height: 85vh; 
            background: var(--glass-container); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2); position: relative; overflow: hidden; 
        }

        .left-panel {
            flex: 1; padding: 40px 30px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            border-right: 1px solid var(--glass-border); position: relative;
        }

        .right-panel { flex: 1.3; padding: 30px; display: flex; flex-direction: column; overflow: hidden; }

        h1 { font-size: 1.8em; margin-bottom: 5px; font-weight: 800; text-shadow: 0 2px 4px rgba(255,255,255,0.3); }
        p.subtitle { line-height: 1.4; font-size: 0.85em; margin-bottom: 25px; opacity: 0.9; }
        
        /* 🌟 NÚT CHUYỂN MODE 🌟 */
        .mode-switch { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; width: 100%;}
        .mode-btn { flex: 1; background: rgba(255, 255, 255, 0.3); border: 1px solid var(--glass-border); color: var(--text-main); padding: 10px 5px; border-radius: 20px; font-weight: 700; cursor: pointer; transition: all 0.3s ease; font-size: 0.8em; white-space: nowrap;}
        .mode-btn.active { background: var(--active-bg); color: var(--active-text); border-color: transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .filter-container { width: 100%; margin-bottom: 20px; display: none; }
        .glass-select { width: 100%; padding: 10px; font-size: 0.9em; font-weight: 600; color: var(--text-main); background: rgba(255, 255, 255, 0.4); border: 1px solid var(--glass-border); border-radius: 12px; outline: none; cursor: pointer; text-align: center; }
        
        /* 🌟 BỘ ĐIỀU KHIỂN SPOTIFY 🌟 */
        .player-controls { display: none; gap: 8px; margin-top: 15px; width: 100%; justify-content: center; flex-wrap: wrap;}
        .ctrl-btn { background: rgba(255,255,255,0.2); border: 1px solid var(--glass-border); border-radius: 12px; padding: 6px 10px; font-size: 0.75em; font-weight: 600; cursor: pointer; color: var(--text-main); transition: all 0.2s; }
        .ctrl-btn.active { background: var(--active-bg); color: white; border: none; }

        audio { width: 100%; border-radius: 30px; opacity: 0.9; margin-top: auto; }

        .playlist-header { font-size: 1.1em; font-weight: 800; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--glass-border); }
        
        .playlist { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 8px; }
        .playlist::-webkit-scrollbar { width: 5px; }
        .playlist::-webkit-scrollbar-thumb { background: var(--active-bg); border-radius: 10px; }

        .track-card { background-color: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 14px; padding: 12px; cursor: pointer; transition: all 0.2s ease; }
        .track-card:hover { transform: translateY(-2px); background-color: var(--card-hover); }
        .active-song { background-color: var(--active-bg); color: var(--active-text); border: none; }
        
        .track-title { font-weight: bold; font-size: 1em; margin-bottom: 3px; }
        .track-meta { font-size: 0.7em; margin-bottom: 6px; font-style: italic; opacity: 0.8; }
        .track-summary { font-size: 0.8em; opacity: 0.8; line-height: 1.3; }
        
        .tags-container { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
        .badge { padding: 3px 8px; font-size: 0.65em; font-weight: 600; background: rgba(255, 255, 255, 0.4); border: 1px solid var(--glass-border); border-radius: 10px; }
        .active-song .badge { background: rgba(255, 255, 255, 0.2); border-color: rgba(255, 255, 255, 0.4); color: white; }

        @media (max-width: 768px) {
            .main-wrapper { flex-direction: column; height: 90vh; overflow-y: auto; }
            .left-panel { border-right: none; border-bottom: 1px solid var(--glass-border); }
            .right-panel { overflow: visible; }
            .playlist { overflow-y: visible; }
        }
    </style>
</head>
<body>
    <div class="theme-switcher">
        <button class="theme-btn btn-pinky" onclick="setTheme('pinky')"></button>
        <button class="theme-btn btn-greeny" onclick="setTheme('greeny')"></button>
        <button class="theme-btn btn-bluebaby" onclick="setTheme('bluebaby')"></button>
        <button class="theme-btn btn-blackwhite" onclick="setTheme('blackwhite')"></button>
    </div>

    <div class="main-wrapper">
        <div class="left-panel">
            <h1 id="main-title">🎙️ BBC AI Podcast</h1>
            <p id="main-subtitle" class="subtitle">Bản tin tự động tổng hợp từ BBC.</p>
            
            <div class="mode-switch">
                <button id="btn-news" class="mode-btn active" onclick="switchMode('news')">Engrisk</button>
                <button id="btn-novel" class="mode-btn" onclick="switchMode('novel')">Vietnamlove</button>
                <button id="btn-fav" class="mode-btn" onclick="switchMode('fav')">Tabi urfav</button>
            </div>

            <div id="filter-container" class="filter-container">
                <select id="story-filter" class="glass-select" onchange="applyFilter()">
                    <option value="all">Tất cả truyện</option>
                </select>
            </div>

            <audio id="podcastPlayer" controls>
                <source id="audioSource" src="">
            </audio>

            <div id="player-controls" class="player-controls">
                <button id="btn-shuffle" class="ctrl-btn" onclick="setPlaybackMode('shuffle')">Shuffle</button>
                <button id="btn-repeat-one" class="ctrl-btn" onclick="setPlaybackMode('one')">Repeat 1</button>
                <button id="btn-repeat-all" class="ctrl-btn" onclick="setPlaybackMode('all')">Repeat All</button>
            </div>
        </div>

        <div class="right-panel">
            <div class="playlist-header">
                <span id="playlist-title">🎧 Danh sách phát</span>
            </div>
            <div class="playlist" id="playlistContainer"></div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="config_novel.js"></script>
    <script src="config_fav.js"></script>
    
    <script>
        // --- TRẠNG THÁI HỆ THỐNG ---
        let currentPlaylist = [];
        let currentIndex = 0;
        let playbackMode = localStorage.getItem('tabi_playback_mode') || 'all'; 

        const audioPlayer = document.getElementById("podcastPlayer");
        const audioSource = document.getElementById("audioSource");

        // --- CÀI ĐẶT THEME ---
        function setTheme(themeName) {
            document.body.classList.remove('theme-greeny', 'theme-bluebaby', 'theme-blackwhite');
            if (themeName !== 'pinky') document.body.classList.add('theme-' + themeName);
            localStorage.setItem('selectedTheme', themeName);
        }
        setTheme(localStorage.getItem('selectedTheme') || 'pinky');

        // --- LOGIC THỜI GIAN ---
        function timeAgo(dateString) {
            if (!dateString) return "";
            const diffMins = Math.round((new Date() - new Date(dateString)) / 60000);
            if (diffMins < 1) return "Vừa xong";
            if (diffMins < 60) return `${diffMins} phút trước`;
            if (diffMins < 1440) return `${Math.round(diffMins / 60)} giờ trước`;
            return `${Math.round(diffMins / 1440)} ngày trước`;
        }

        // --- ĐIỀU KHIỂN SPOTIFY (TRÍ NHỚ & LOẠI TRỪ) ---
        function setPlaybackMode(mode) {
            playbackMode = mode;
            localStorage.setItem('tabi_playback_mode', mode);
            updateControlUI();
        }

        function updateControlUI() {
            document.getElementById('btn-shuffle').classList.toggle('active', playbackMode === 'shuffle');
            document.getElementById('btn-repeat-one').classList.toggle('active', playbackMode === 'one');
            document.getElementById('btn-repeat-all').classList.toggle('active', playbackMode === 'all');
        }

        audioPlayer.onended = function() {
            if (playbackMode === 'one') {
                audioPlayer.currentTime = 0;
                audioPlayer.play();
            } else {
                nextTrack();
            }
        };

        function nextTrack() {
            if (currentPlaylist.length === 0) return;
            if (playbackMode === 'shuffle') {
                let nextIndex;
                do { nextIndex = Math.floor(Math.random() * currentPlaylist.length); } 
                while (nextIndex === currentIndex && currentPlaylist.length > 1);
                currentIndex = nextIndex;
            } else {
                currentIndex++;
                if (currentIndex >= currentPlaylist.length) {
                    if (playbackMode === 'all') currentIndex = 0;
                    else return;
                }
            }
            playAtIndex(currentIndex);
        }

        function playAtIndex(index) {
            currentIndex = index;
            const track = currentPlaylist[index];
            audioSource.src = track.url;
            audioPlayer.load();
            audioPlayer.play();
            
            document.querySelectorAll('.track-card').forEach((card, i) => {
                card.classList.toggle('active-song', i === index);
            });
        }

        // --- VẼ GIAO DIỆN ---
        function renderPlaylist(dataArray, latestAudioUrl) {
            currentPlaylist = dataArray;
            let container = document.getElementById("playlistContainer");
            container.innerHTML = ""; 

            if (!dataArray || dataArray.length === 0) {
                container.innerHTML = "<p style='text-align:center;'>Kho nhạc đang trống...</p>";
                audioSource.src = ""; audioPlayer.load();
                return;
            }

            audioSource.src = latestAudioUrl;
            audioPlayer.load();

            dataArray.forEach((track, index) => {
                let card = document.createElement("div");
                card.className = "track-card";
                if (index === 0) card.classList.add("active-song");

                let tagsHtml = "";
                if (track.ielts_score) tagsHtml += `<span class="badge ielts">🎯 IELTS: ${track.ielts_score}</span>`;
                if (track.hashtags && Array.isArray(track.hashtags)) {
                    track.hashtags.forEach(tag => tagsHtml += `<span class="badge">${tag}</span>`);
                }
                
                let subtitle = track.artist ? `🎤 ${track.artist}` : (track.summary || "");

                card.innerHTML = `
                    <div class="track-title">🎧 ${track.title}</div>
                    ${track.timestamp ? `<div class="track-meta">🗓️ ${new Date(track.timestamp).toLocaleDateString('vi-VN')} • ⏳ ${timeAgo(track.timestamp)}</div>` : ''}
                    <div class="tags-container">${tagsHtml}</div>
                    <div class="track-summary">${subtitle}</div>
                `;

                card.onclick = () => playAtIndex(index);
                container.appendChild(card);
            });
        }

        function populateFilter() {
            const select = document.getElementById('story-filter');
            select.innerHTML = '<option value="all">Tất cả truyện</option>';
            if (typeof NOVEL_LIST === 'undefined') return;
            const uniqueStories = [...new Set(NOVEL_LIST.map(item => item.story_id))].filter(Boolean);
            uniqueStories.forEach(storyId => {
                let option = document.createElement('option');
                option.value = storyId; option.textContent = `📖 Bộ: ${storyId}`; 
                select.appendChild(option);
            });
        }

        function applyFilter() {
            const selectedId = document.getElementById('story-filter').value;
            let filteredData = (selectedId === 'all') ? (NOVEL_LIST || []) : NOVEL_LIST.filter(item => item.story_id === selectedId);
            renderPlaylist(filteredData, filteredData.length > 0 ? filteredData[0].url : "");
        }

        // --- CHUYỂN ĐỔI CHẾ ĐỘ ---
        function switchMode(mode) {
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');

            const titleEl = document.getElementById('main-title');
            const subEl = document.getElementById('main-subtitle');
            const filterContainer = document.getElementById('filter-container');
            const playlistTitle = document.getElementById('playlist-title');
            const playerControls = document.getElementById('player-controls');

            if (mode === 'news') {
                titleEl.innerHTML = "🎙️ BBC AI Podcast";
                subEl.innerHTML = "Bản tin tự động tổng hợp từ BBC.<br>Powered by Lovely Meo Meo";
                playlistTitle.innerHTML = "📰 Tin tức mới nhất";
                filterContainer.style.display = 'none'; playerControls.style.display = 'none';
                renderPlaylist(typeof PODCAST_LIST !== 'undefined' ? PODCAST_LIST : [], typeof LATEST_PODCAST !== 'undefined' ? LATEST_PODCAST : "");
            } else if (mode === 'novel') {
                titleEl.innerHTML = "🌙 Tabi yêu ngủ ngon";
                subEl.innerHTML = "Đắp chăn và nghe anh kể chuyện nha bé ngoan.<br>Powered by Lovely Meo Meo";
                playlistTitle.innerHTML = "📖 Tủ sách của chồng";
                filterContainer.style.display = 'block'; playerControls.style.display = 'flex';
                populateFilter(); applyFilter();    
            } else if (mode === 'fav') {
                titleEl.innerHTML = "Tabi urfav";
                subEl.innerHTML = "Một góc nhỏ dành cho súp lơ bé bỏng<br>Born to say Love you Meo Meo";
                playlistTitle.innerHTML = "🎵 Bibi Playlist";
                filterContainer.style.display = 'none'; playerControls.style.display = 'flex';
                let favData = typeof FAV_LIST !== 'undefined' ? FAV_LIST : [];
                renderPlaylist(favData, favData.length > 0 ? favData[0].url : "");
            }
        }

        // Khởi tạo
        updateControlUI();
        switchMode('news');
    </script>
</body>
</html>
