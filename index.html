<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBC AI Podcast</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f8e7ee;
            margin: 0;
            color: #994a62;
        }
        .container {
            background: rgb(246, 220, 220);
            padding: 40px 30px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            position: relative;
        }
        .my-sticker {
            position: absolute; /* Lệnh cho phép ảnh bay lơ lửng tự do */
            top: -30px;         /* Kéo ảnh lên trên mép khung 30px */
            right: -20px;       /* Kéo ảnh ra mép phải 20px */
            width: 80px;        /* Kích thước ảnh */
            transform: rotate(15deg); /* Nghiêng ảnh 15 độ cho nghệ thuật */
        }
        h1 { color: #713651; }
        p { color: #a83e73; line-height: 1.5; }
        audio {
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="download1.jpg" alt="Cute Sticker" class="my-sticker">
        <h1>🎙️ BBC AI Podcast</h1>
        
        <p>This podcast is automatically generated by AI from the latest BBC news. <br> Built with Python, Gemini, and Kokoro TTS.</p>
        
        <audio id="podcastPlayer" controls>
            <source id="audioSource" src="" type="audio/wav">
            Your browser does not support the audio element.
        </audio>

        <script src="config.js"></script>

        <script>
            // Kiểm tra xem biến LATEST_PODCAST có tồn tại không (phòng trường hợp file config.js bị lỗi)
            if (typeof LATEST_PODCAST !== 'undefined') {
                document.getElementById("audioSource").src = LATEST_PODCAST;
                document.getElementById("podcastPlayer").load(); // Tải lại audio
            } else {
                console.log("❌ Chưa tìm thấy file config.js hoặc chưa có bài podcast nào được tạo.");
            }
        </script>
    </div>
</body>
</html>
