<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBC AI Podcast</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f8e7ee;
            margin: 0;
            color: #994a62;
        }
        .container {
            background: rgb(246, 220, 220);
            padding: 40px 30px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            position: relative;
            width: 90%; /* Thêm để responsive trên điện thoại */
        }
        .my-sticker {
            position: absolute;
            top: -30px;
            right: -20px;
            width: 80px;
            transform: rotate(15deg);
        }
        h1 { color: #713651; }
        p { color: #a83e73; line-height: 1.5; }
        audio {
            margin-top: 20px;
            width: 100%;
        }
        
        /* --- CSS MỚI CHO PLAYLIST TÔNG XUYỆT TÔNG --- */
        .playlist {
            margin-top: 20px;
            max-height: 160px; /* Chiều cao cố định, dư bài thì tự có thanh cuộn */
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 5px;
        }
        .playlist-btn {
            background-color: #fff0f5;
            border: 1px solid #ffb6c1;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            color: #a83e73;
            font-weight: bold;
            text-align: left;
            transition: all 0.3s ease;
        }
        .playlist-btn:hover {
            background-color: #ffb6c1;
            color: white;
        }
        /* Style cho bài hát đang được chọn */
        .active-song {
            background-color: #e57399; /* Màu đậm hơn để nổi bật */
            color: white;
            border-color: #e57399;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="download1.jpg" alt="Cute Sticker" class="my-sticker">
        <h1>🎙️ BBC AI Podcast</h1>
        <p>This podcast is automatically generated by AI from the latest BBC news. <br> Built with lovely Bibi~ Meo meo Tabiurfav.</p>
        
        <audio id="podcastPlayer" controls>
            <source id="audioSource" src="" type="audio/wav">
            Trình duyệt của bạn không hỗ trợ phát âm thanh.
        </audio>

        <div class="playlist" id="playlistContainer"></div>

        <script src="config.js"></script>

        <script>
            if (typeof PODCAST_LIST !== 'undefined' && PODCAST_LIST.length > 0) {
                let player = document.getElementById("podcastPlayer");
                let source = document.getElementById("audioSource");
                let container = document.getElementById("playlistContainer");

                // 1. Mặc định mở bài mới nhất khi vào web
                source.src = LATEST_PODCAST;
                player.load();

                // 2. Vòng lặp tạo danh sách nút bấm cho từng bài podcast
                PODCAST_LIST.forEach((fileUrl, index) => {
                    let btn = document.createElement("button");
                    btn.className = "playlist-btn";
                    
                    // Đánh dấu bài đầu tiên là bài đang chọn (Active)
                    if (index === 0) btn.classList.add("active-song");

                    // Cắt lấy tên file gốc để hiển thị cho gọn (VD: bbc_podcast_2026...wav)
                    let fileName = fileUrl.split('/').pop(); 
                    
                    // Nếu thích, tao có thể code thêm đoạn cắt đuôi .wav và chỉnh lại tên đẹp hơn, 
                    // tạm thời cứ để nguyên tên file kèm icon tai nghe cho xịn.
                    btn.innerText = "🎧 " + fileName;

                    // 3. Sự kiện: Khi user click vào nút
                    btn.onclick = function() {
                        // Đổi nguồn nhạc và phát
                        source.src = fileUrl;
                        player.load();
                        player.play();

                        // Xóa class active ở tất cả các nút, rồi gắn lại vào nút vừa bấm
                        document.querySelectorAll('.playlist-btn').forEach(b => b.classList.remove('active-song'));
                        this.classList.add('active-song');
                    };

                    // Bơm nút vào khung playlist
                    container.appendChild(btn);
                });
            } else {
                document.getElementById("playlistContainer").innerHTML = "<p>Chưa có bài podcast nào được tạo.</p>";
            }
        </script>
    </div>
</body>
</html>
