<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBC Daily Podcast</title>
    <style>
        /* 🌟 BƯỚC 1: KHAI BÁO BIẾN CSS (CSS VARIABLES) 🌟 */
        /* Mặc định là Theme Pinky (Hồng) của chị */
        :root {
            --bg-body: #f8e7ee;
            --bg-container: rgb(246, 220, 220);
            --text-main: #713651;
            --text-sub: #a83e73;
            --card-bg: #fff0f5;
            --card-border: #ffb6c1;
            --card-hover: #ffe4eb;
            --active-bg: #e57399;
            --active-text: #ffffff;
            --meta-text: #c86b8e;
            --sticker-filter: none; /* Không làm mờ sticker */
        }

        /* Theme Greeny (Xanh lá dứa) */
        body.theme-greeny {
            --bg-body: #e8f5e9;
            --bg-container: #c8e6c9;
            --text-main: #1b5e20;
            --text-sub: #388e3c;
            --card-bg: #f1f8e9;
            --card-border: #a5d6a7;
            --card-hover: #e8f5e9;
            --active-bg: #4caf50;
            --active-text: #ffffff;
            --meta-text: #66bb6a;
        }

        /* Theme Blue Baby (Xanh da trời) */
        body.theme-bluebaby {
            --bg-body: #e3f2fd;
            --bg-container: #bbdefb;
            --text-main: #0d47a1;
            --text-sub: #1976d2;
            --card-bg: #e3f2fd;
            --card-border: #90caf9;
            --card-hover: #bbdefb;
            --active-bg: #2196f3;
            --active-text: #ffffff;
            --meta-text: #42a5f5;
        }

        /* Theme Black-White (Trắng Đen / Dark Mode) */
        body.theme-blackwhite {
            --bg-body: #12121286;
            --bg-container: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --card-bg: #2c2c2c;
            --card-border: #444444;
            --card-hover: #3a3a3acd;
            --active-bg: #ffffff;
            --active-text: #000000b7;
            --meta-text: #888888;
        }

        /* 🌟 BƯỚC 2: ÁP DỤNG BIẾN CSS VÀO GIAO DIỆN 🌟 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: var(--bg-body); /* Dùng biến thay vì màu cứng */
            margin: 0;
            color: var(--text-main);
            transition: background-color 0.4s ease; /* Hiệu ứng chuyển màu mượt */
        }
        
        /* Bộ chọn Theme (Theme Switcher UI) */
        .theme-switcher {
            position: absolute;
            top: 15px;
            left: 20px;
            display: flex;
            gap: 8px;
        }
        .theme-btn {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .theme-btn:hover { transform: scale(1.2); }
        .btn-pinky { background-color: #f8e7ee; border-color: #e57399; }
        .btn-greeny { background-color: #e8f5e9; border-color: #4caf50; }
        .btn-bluebaby { background-color: #e3f2fd; border-color: #2196f3; }
        .btn-blackwhite { background-color: #121212; border-color: #ffffff; }

        .container {
            background: var(--bg-container);
            padding: 40px 30px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
            position: relative;
            transition: background-color 0.4s ease;
        }
        .my-sticker {
            position: absolute;
            top: -35px;
            right: -15px;
            width: 85px;
            transform: rotate(15deg);
            filter: var(--sticker-filter); /* Đổi màu sticker theo theme */
            transition: filter 0.4s ease;
        }
        h1 { color: var(--text-main); margin-bottom: 5px; font-weight: 800;}
        p.subtitle { color: var(--text-sub); line-height: 1.5; font-size: 0.9em; margin-bottom: 25px;}
        
        audio {
            width: 100%;
            margin-bottom: 20px;
            border-radius: 20px;
        }

        .playlist {
            max-height: 280px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 5px;
            text-align: left;
        }
        .playlist::-webkit-scrollbar { width: 6px; }
        .playlist::-webkit-scrollbar-thumb { background: var(--active-bg); border-radius: 10px; }

        .track-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .track-card:hover {
            background-color: var(--card-hover);
            transform: translateY(-2px);
        }
        .active-song {
            background-color: var(--active-bg);
            color: var(--active-text);
            border-color: var(--active-bg);
        }
        .active-song .track-meta, .active-song .track-summary {
            color: var(--active-text);
            opacity: 0.9;
        }
        
        .track-title { font-weight: bold; font-size: 1.05em; margin-bottom: 4px; }
        .track-meta { font-size: 0.75em; color: var(--meta-text); margin-bottom: 8px; font-style: italic; }
        .track-summary { font-size: 0.85em; color: var(--text-main); opacity: 0.8; line-height: 1.3; }
    </style>
</head>
<body>
    <div class="container">
        <div class="theme-switcher">
            <button class="theme-btn btn-pinky" onclick="setTheme('pinky')" title="Pinky"></button>
            <button class="theme-btn btn-greeny" onclick="setTheme('greeny')" title="Greeny"></button>
            <button class="theme-btn btn-bluebaby" onclick="setTheme('bluebaby')" title="Blue Baby"></button>
            <button class="theme-btn btn-blackwhite" onclick="setTheme('blackwhite')" title="Black & White"></button>
        </div>

        <img src="download1.jpg" alt="Cute Sticker" class="my-sticker">
        <h1>🎙️ BBC AI Daily</h1>
        <p class="subtitle">Tự động tổng hợp và đọc báo lúc 6h sáng.<br>Powered by Gemini & Edge TTS.</p>
        
        <audio id="podcastPlayer" controls>
            <source id="audioSource" src="" type="audio/wav">
        </audio>

        <div class="playlist" id="playlistContainer"></div>

        <script src="config.js"></script>

        <script>
            // 🌟 BƯỚC 4: LOGIC ĐỔI THEME VÀ LƯU VÀO BỘ NHỚ 🌟
            function setTheme(themeName) {
                // Xóa hết các class theme cũ
                document.body.classList.remove('theme-greeny', 'theme-bluebaby', 'theme-blackwhite');
                
                // Nếu không phải pinky (mặc định), thì add class tương ứng vào
                if (themeName !== 'pinky') {
                    document.body.classList.add('theme-' + themeName);
                }
                
                // Lưu lựa chọn vào LocalStorage để nhớ cho lần sau
                localStorage.setItem('selectedTheme', themeName);
            }

            // Khi web vừa tải xong, kiểm tra xem user đã lưu màu nào chưa
            const savedTheme = localStorage.getItem('selectedTheme') || 'pinky';
            setTheme(savedTheme);


            // --- LOGIC PLAYLIST & TÍNH THỜI GIAN GIỮ NGUYÊN NHƯ CŨ ---
            function timeAgo(dateString) {
                if (!dateString) return "";
                const pastDate = new Date(dateString);
                const now = new Date();
                const diffMs = now - pastDate; 
                
                const diffMins = Math.round(diffMs / 60000);
                const diffHours = Math.round(diffMs / 3600000);
                const diffDays = Math.round(diffMs / 86400000);

                if (diffMins < 1) return "Vừa xong";
                if (diffMins < 60) return `${diffMins} phút trước`;
                if (diffHours < 24) return `${diffHours} giờ trước`;
                return `${diffDays} ngày trước`;
            }

            if (typeof PODCAST_LIST !== 'undefined' && PODCAST_LIST.length > 0) {
                let player = document.getElementById("podcastPlayer");
                let source = document.getElementById("audioSource");
                let container = document.getElementById("playlistContainer");

                source.src = LATEST_PODCAST;
                player.load();

                PODCAST_LIST.forEach((track, index) => {
                    let card = document.createElement("div");
                    card.className = "track-card";
                    if (index === 0) card.classList.add("active-song");

                    let dateStr = "";
                    let timeAgoStr = "";
                    
                    if (track.timestamp) {
                        const dateObj = new Date(track.timestamp);
                        dateStr = dateObj.toLocaleDateString('vi-VN'); 
                        timeAgoStr = timeAgo(track.timestamp);
                    }

                    card.innerHTML = `
                        <div class="track-title">🎧 ${track.title}</div>
                        ${track.timestamp ? `<div class="track-meta">🗓️ ${dateStr} • ⏳ ${timeAgoStr}</div>` : ''}
                        <div class="track-summary">${track.summary}</div>
                    `;

                    card.onclick = function() {
                        source.src = track.url;
                        player.load();
                        player.play();

                        document.querySelectorAll('.track-card').forEach(b => b.classList.remove('active-song'));
                        this.classList.add('active-song');
                    };

                    container.appendChild(card);
                });
            } else {
                document.getElementById("playlistContainer").innerHTML = "<p style='text-align:center;'>Đang cập nhật bản tin...</p>";
            }
        </script>
    </div>
</body>
</html>
