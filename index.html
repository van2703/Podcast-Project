<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBC Daily Podcast</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f8e7ee;
            margin: 0;
            color: #994a62;
        }
        .container {
            background: rgb(246, 220, 220);
            padding: 40px 30px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(153, 74, 98, 0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
            position: relative;
        }
        .my-sticker {
            position: absolute;
            top: -35px;
            right: -15px;
            width: 85px;
            transform: rotate(15deg);
        }
        h1 { color: #713651; margin-bottom: 5px; font-weight: 800;}
        p { color: #a83e73; line-height: 1.5; font-size: 0.9em; margin-bottom: 25px;}
        
        audio {
            width: 100%;
            margin-bottom: 20px;
            border-radius: 20px;
        }

        .playlist {
            max-height: 280px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 5px;
            text-align: left;
        }
        .playlist::-webkit-scrollbar { width: 6px; }
        .playlist::-webkit-scrollbar-thumb { background: #e57399; border-radius: 10px; }

        .track-card {
            background-color: #fff0f5;
            border: 1px solid #ffb6c1;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .track-card:hover {
            background-color: #ffe4eb;
            transform: translateY(-2px);
        }
        .active-song {
            background-color: #e57399;
            color: white;
            border-color: #d85c85;
        }
        
        .track-title {
            font-weight: bold;
            font-size: 1.05em;
            margin-bottom: 4px;
        }
        
        /* CSS MỚI CHO NGÀY GIỜ */
        .track-meta {
            font-size: 0.75em;
            color: #c86b8e;
            margin-bottom: 8px;
            font-style: italic;
        }
        .active-song .track-meta {
            color: #ffe4eb; /* Màu sáng hơn khi bài hát đang được chọn */
        }

        .track-summary {
            font-size: 0.85em;
            opacity: 0.9;
            line-height: 1.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="download1.jpg" alt="Cute Sticker" class="my-sticker">
        <h1>🎙️ BBC AI Podcasst</h1>
        <p>This podcast is automatically generated by AI from the latest BBC news.<br> Lovely Meo Meo </p>
        
        <audio id="podcastPlayer" controls>
            <source id="audioSource" src="" type="audio/wav">
        </audio>

        <div class="playlist" id="playlistContainer"></div>

        <script src="config.js"></script>

        <script>
            // Hàm tính toán thời gian "bao nhiêu phút trước"
            function timeAgo(dateString) {
                if (!dateString) return "";
                const pastDate = new Date(dateString);
                const now = new Date();
                
                // Tính độ chênh lệch bằng mili-giây
                const diffMs = now - pastDate; 
                
                // Quy đổi ra phút, giờ, ngày
                const diffMins = Math.round(diffMs / 60000);
                const diffHours = Math.round(diffMs / 3600000);
                const diffDays = Math.round(diffMs / 86400000);

                if (diffMins < 1) return "Vừa xong";
                if (diffMins < 60) return `${diffMins} phút trước`;
                if (diffHours < 24) return `${diffHours} giờ trước`;
                return `${diffDays} ngày trước`;
            }

            if (typeof PODCAST_LIST !== 'undefined' && PODCAST_LIST.length > 0) {
                let player = document.getElementById("podcastPlayer");
                let source = document.getElementById("audioSource");
                let container = document.getElementById("playlistContainer");

                source.src = LATEST_PODCAST;
                player.load();

                PODCAST_LIST.forEach((track, index) => {
                    let card = document.createElement("div");
                    card.className = "track-card";
                    if (index === 0) card.classList.add("active-song");

                    // Xử lý hiển thị ngày giờ
                    let dateStr = "";
                    let timeAgoStr = "";
                    
                    if (track.timestamp) {
                        const dateObj = new Date(track.timestamp);
                        // Lấy ngày/tháng/năm chuẩn Việt Nam
                        dateStr = dateObj.toLocaleDateString('vi-VN'); 
                        // Lấy thời gian "X phút trước"
                        timeAgoStr = timeAgo(track.timestamp);
                    }

                    // Bơm dữ liệu vào thẻ HTML
                    card.innerHTML = `
                        <div class="track-title">🎧 ${track.title}</div>
                        ${track.timestamp ? `<div class="track-meta">🗓️ ${dateStr} •  ${timeAgoStr}</div>` : ''}
                        <div class="track-summary">${track.summary}</div>
                    `;

                    card.onclick = function() {
                        source.src = track.url;
                        player.load();
                        player.play();

                        document.querySelectorAll('.track-card').forEach(b => b.classList.remove('active-song'));
                        this.classList.add('active-song');
                    };

                    container.appendChild(card);
                });
            } else {
                document.getElementById("playlistContainer").innerHTML = "<p style='text-align:center;'>Đang cập nhật bản tin...</p>";
            }
        </script>
    </div>
</body>
</html>
