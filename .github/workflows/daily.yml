name: Daily Podcast Generation

on:
  schedule:
    - cron: '0 1 * * *'  # 1h UTC = 8h UTC+7 (Vietnam time)
  workflow_dispatch:  # Cho phép chạy thủ công

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Cần thiết để push lên gh-pages

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directories
        run: |
          mkdir -p data/articles data/processed output logs

      - name: Generate podcast
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          TTS_PROVIDER: ${{ secrets.TTS_PROVIDER || 'elevenlabs' }}
          OPENAI_VOICE: ${{ secrets.OPENAI_VOICE || 'alloy' }}
        run: |
          python main.py

      - name: Upload artifacts (backup)
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: podcast-${{ github.run_number }}
          path: |
            output/
            logs/
          retention-days: 7