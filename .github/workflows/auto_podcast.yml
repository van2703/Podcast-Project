name: Auto Daily BBC Podcast

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 4. Install Python Libraries
        run: |
          python -m pip install --upgrade pip
          # Bổ sung thêm feedparser vào cuối danh sách này
          pip install google-genai edge-tts pydub soundfile numpy python-dotenv feedparser

      - name: 5. Ensure Directories Exist
        run: |
          mkdir -p data scripts audios music

      - name: 6. Run Python Scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TZ: 'Asia/Ho_Chi_Minh'
          # Khai báo trực tiếp link RSS công khai ở đây cho bot nó đọc
          BBC_RSS_URL: "https://feeds.bbci.co.uk/news/world/rss.xml" 
        run: |
          echo "Bắt đầu cào tin BBC..."
          python fetch_bbc.py 
          
          echo "Bắt đầu gọi Gemini làm kịch bản..."
          python generate_script.py 
          
          echo "Bắt đầu thu âm và mix nhạc..."
          python text_to_voice.py

      - name: 7. Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/ scripts/ audios/ config.js
          git commit -m "Auto-generate daily podcast & update config" || echo "No changes to commit"
          git push