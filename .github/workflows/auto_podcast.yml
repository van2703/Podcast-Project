name: Auto Daily BBC Podcast

on:
  schedule:
    # Hẹn giờ chạy: 23:00 UTC (Giờ máy chủ) tương đương 06:00 AM giờ Việt Nam
    - cron: '0 23 * * *'
  workflow_dispatch: # Nút bấm ma thuật giúp chị chạy tay trên web để test bất cứ lúc nào

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cấp quyền tối cao để con bot được phép đẩy file mới lên repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies (FFmpeg for Pydub)
        # Bắt buộc phải cài ffmpeg trên máy chủ Linux thì pydub mới mix nhạc được
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python Libraries
        # Cài các thư viện cần thiết. Chị có xài thư viện cào tin nào (như requests, bs4) thì thêm vào đây nhé
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai edge-tts pydub soundfile numpy

      - name: Run Python Scripts
        env:
           # Kéo API Key từ két sắt bảo mật của GitHub ra (Sẽ cài đặt ở Bước 2)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        # Chỗ này cực kỳ quan trọng:
        # 1. Chạy file lấy tin tức và gọi Gemini viết kịch bản trước (tao giả sử file đó tên là main.py)
        # 2. Sau đó mới chạy file text_to_voice.py để làm audio
        run: |
          python generate_script.py
          python text_to_voice.py

      - name: Commit and Push to GitHub Pages
        # Bot tự động gom các file .wav trong thư mục audios/ và file config.js mới để đẩy lên web
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add audios/ scripts/ config.js
          git commit -m "Auto-generate daily podcast & update config" || echo "No changes to commit"
          git push